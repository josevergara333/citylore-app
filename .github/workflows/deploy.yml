name: Deploy CityLore to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --base-href /citylore-app/

      - name: Disable service worker
        run: |
          python3 -c "
          import re
          with open('build/web/flutter_bootstrap.js', 'r') as f:
              content = f.read()
          content = re.sub(r'_flutter\.loader\.load\(\{[^}]*serviceWorkerSettings[^}]*\}[^)]*\)', '_flutter.loader.load({})', content)
          with open('build/web/flutter_bootstrap.js', 'w') as f:
              f.write(content)
          print('Done')
          "

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true