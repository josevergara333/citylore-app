name: Deploy CityLore to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Clean
        run: flutter clean

      - name: Build web
        run: flutter build web --base-href /citylore-app/

      - name: Bust CDN cache
        run: |
          mv build/web/main.dart.js build/web/main.dart.v2.js
          sed -i 's|main.dart.js|main.dart.v2.js|g' build/web/index.html
          sed -i 's|main.dart.js|main.dart.v2.js|g' build/web/flutter_bootstrap.js

      - name: Unregister service worker
        run: |
          sed -i 's|</body>|<script>if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(r=>{for(let s of r)s.unregister();});}</script></body>|' build/web/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
          force_orphan: true